<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercadia Admin - Productos</title>

<link rel="stylesheet" href="css/styles.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
display:flex;
background:#f1f5f9;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
padding:20px;
flex-shrink:0;
}

.logo{
font-size:22px;
font-weight:600;
margin-bottom:30px;
}

.menu a{
display:block;
padding:12px;
color:#cbd5f5;
text-decoration:none;
border-radius:6px;
margin-bottom:6px;
}

.menu a:hover{
background:#1e293b;
color:white;
}

.logout{
margin-top:auto;
background:#ef4444;
border:none;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
}

/* CONTENT */

.content{
flex:1;
padding:30px;
overflow:auto;
min-width:0;
}

.header{
font-size:24px;
margin-bottom:20px;
}

/* FORM */

.form-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:25px;
}

.form-row{
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
}

.form-row input{
padding:10px;
border:1px solid #d1d5db;
border-radius:6px;
min-width:150px;
}

.form-row label{
display:flex;
align-items:center;
gap:6px;
font-size:14px;
}

.form-row button{
padding:10px 16px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.form-row button:hover{
background:#1e40af;
}

/* TABLE */

.table-card{
background:white;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:700px;
}

th,td{
padding:12px;
border-bottom:1px solid #e5e7eb;
text-align:left;
}

th{
background:#f8fafc;
}

img{
width:60px;
border-radius:6px;
}

.actions button{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:5px;
}

.edit{
background:#2563eb;
color:white;
}

.delete{
background:#ef4444;
color:white;
}

.featured{
font-weight:bold;
color:#16a34a;
}

/* TABLET */

@media (max-width:900px){

.sidebar{
width:180px;
padding:15px;
}

.content{
padding:20px;
}

}

/* MOBILE */

@media (max-width:600px){

.sidebar{
width:80px;
padding:15px 10px;
}

.logo{
font-size:14px;
margin-bottom:20px;
}

.menu a{
font-size:12px;
padding:8px;
}

.logout{
font-size:11px;
padding:8px;
}

.header{
font-size:20px;
}

.form-row{
flex-direction:column;
align-items:stretch;
}

.form-row input,
.form-row button{
width:100%;
}

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
Mercadia
</div>

<div class="menu">

<a href="dashboard.html">Dashboard</a>
<a href="products.html">Productos</a>

</div>

<button class="logout" onclick="logout()">
Cerrar sesión
</button>

</div>


<div class="content">

<div class="header">
Gestión de productos
</div>


<div class="form-card">

<form id="product-form" onsubmit="event.preventDefault(); createProduct();">

<div class="form-row">

<input id="name" placeholder="Nombre producto" required>

<input id="description" placeholder="Descripción">

<input id="price" type="number" placeholder="Precio" required>

<input type="file" id="image">

<input id="category" placeholder="Categoría">

<label>
<input type="checkbox" id="featured">
Destacado
</label>

<button id="save-btn" type="submit">
Agregar
</button>

</div>

</form>

</div>


<div class="table-card">

<table>

<thead>

<tr>
<th>Nombre</th>
<th>Descripción</th>
<th>Precio</th>
<th>Imagen</th>
<th>Categoría</th>
<th>⭐</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="products-table"></tbody>

</table>

</div>

</div>


<script src="js/auth.js"></script>

<script>

protect();

</script>

<script type="module" src="js/products.js"></script>

</body>
</html>
