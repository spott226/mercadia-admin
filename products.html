<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercadia Admin - Productos</title>

<link rel="stylesheet" href="css/styles.css">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
display:flex;
background:#f1f5f9;
min-height:100vh;
overflow-x:hidden;
}

/* SIDEBAR */
.sidebar{
width:230px;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
padding:20px;
}

.logo{
font-size:22px;
font-weight:600;
margin-bottom:30px;
}

.menu a{
display:block;
padding:12px;
color:#cbd5f5;
text-decoration:none;
border-radius:6px;
margin-bottom:6px;
}

.menu a:hover{
background:#1e293b;
color:white;
}

.logout{
margin-top:auto;
background:#ef4444;
border:none;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
}

/* CONTENT */
.content{
flex:1;
padding:30px;
}

/* FORM */
.form-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:25px;
}

.form-row{
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
}

.form-row input{
padding:10px;
border:1px solid #d1d5db;
border-radius:6px;
}

.form-row button{
padding:10px 16px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* VARIANTES */
.variant-item{
background:#f8fafc;
padding:10px;
border-radius:6px;
margin-top:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* TABLE */
.table-card{
background:white;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #e5e7eb;
}

img{
width:60px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">Mercadia</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="products.html">Productos</a>
</div>

<button class="logout" onclick="logout()">Cerrar sesión</button>

</div>


<div class="content">

<h2>Gestión de productos</h2>

<div class="form-card">

<form id="product-form" onsubmit="event.preventDefault(); createProduct();">

<div class="form-row">

<input id="name" placeholder="Nombre producto" required>

<input id="description" placeholder="Descripción">

<input id="price" type="number" placeholder="Precio" required>

<input type="file" id="image">

<input id="category" placeholder="Categoría">

<label>
<input type="checkbox" id="featured"> Destacado
</label>

<button id="save-btn" type="submit">Agregar</button>

</div>

</form>

<!-- VARIANTES -->

<div style="margin-top:20px;">

<h3>Variantes (1 imagen por color)</h3>

<div class="form-row">

<input id="variant-color" placeholder="Color (ej: rojo)">

<input id="variant-size" placeholder="Tallas (ej: S,M,L)">

<input id="variant-price" type="number" placeholder="Precio variante">

<input type="file" id="variant-image">

<button type="button" onclick="addVariant()">
Agregar variante
</button>

</div>

<div id="variants-list"></div>

</div>

</div>


<div class="table-card">

<table>

<thead>
<tr>
<th>Nombre</th>
<th>Precio</th>
<th>Imagen</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="products-table"></tbody>

</table>

</div>

</div>

<script src="js/auth.js"></script>
<script type="module" src="js/products.js"></script>

</body>
</html>
