<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercadia Admin - Productos</title>

<link rel="stylesheet" href="css/styles.css">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
display:flex;
background:#f1f5f9;
min-height:100vh;
overflow-x:hidden;
}


/* SIDEBAR */

.sidebar{
width:230px;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
padding:20px;
flex-shrink:0;
}

.logo{
font-size:22px;
font-weight:600;
margin-bottom:30px;
}

.menu a{
display:block;
padding:12px;
color:#cbd5f5;
text-decoration:none;
border-radius:6px;
margin-bottom:6px;
transition:0.2s;
}

.menu a:hover{
background:#1e293b;
color:white;
}

.logout{
margin-top:auto;
background:#ef4444;
border:none;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
}


/* CONTENT */

.content{
flex:1;
padding:30px;
min-width:0;
}

.page-title{
font-size:28px;
font-weight:600;
margin-bottom:25px;
}


/* FORM */

.form-card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:25px;
}

.form-row{
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
}

.form-row input,
.form-row select{
padding:10px;
border:1px solid #d1d5db;
border-radius:6px;
min-width:180px;
}

.form-row button{
padding:10px 16px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:500;
}

.form-row button:hover{
background:#1d4ed8;
}


/* FILTERS */

.filters-card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.filters-grid{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

.filters-grid input,
.filters-grid select{
padding:10px;
border:1px solid #d1d5db;
border-radius:6px;
min-width:180px;
background:white;
}

.info-row{
margin-top:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
color:#475569;
font-size:14px;
}


/* VARIANTES */

.variant-item{
background:#f8fafc;
padding:14px;
border-radius:8px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e2e8f0;
}


/* TABLE */

.table-card{
background:white;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#f8fafc;
font-weight:600;
}

th,td{
padding:14px;
border-bottom:1px solid #e5e7eb;
text-align:left;
}

td img{
width:70px;
height:70px;
object-fit:cover;
border-radius:8px;
}

.action-btn{
padding:7px 10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:13px;
margin-right:6px;
}

.edit-btn{
background:#2563eb;
color:white;
}

.delete-btn{
background:#ef4444;
color:white;
}

.stock-low{
color:#dc2626;
font-weight:bold;
}

.stock-ok{
color:#16a34a;
font-weight:bold;
}


/* PAGINATION */

.pagination{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
padding:20px;
flex-wrap:wrap;
}

.pagination button{
padding:10px 15px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

.pagination button:disabled{
opacity:0.5;
cursor:not-allowed;
}

#page-info{
font-weight:600;
color:#334155;
}


/* RESPONSIVE */

@media(max-width:900px){

.sidebar{
width:180px;
padding:15px;
}

.content{
padding:20px;
}

}

@media(max-width:700px){

body{
display:block;
}

.sidebar{
width:100%;
height:auto;
}

.content{
padding:15px;
}

.form-row,
.filters-grid{
flex-direction:column;
align-items:stretch;
}

.form-row input,
.form-row button,
.form-row select,
.filters-grid input,
.filters-grid select{
width:100%;
}

.page-title{
font-size:24px;
}

.info-row{
flex-direction:column;
align-items:flex-start;
}

}

</style>

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Mercadia
</div>

<div class="menu">

<a href="dashboard.html">
Dashboard
</a>

<a href="products.html">
Productos
</a>

<a href="orders.html">
Pedidos
</a>

<a href="inventory.html">
Inventario
</a>

<a href="customers.html">
Clientes
</a>

</div>

<button class="logout" onclick="logout()">
Cerrar sesión
</button>

</div>


<!-- CONTENT -->

<div class="content">

<h2 class="page-title">
Gestión de productos
</h2>


<!-- FORM -->

<div class="form-card">

<form
id="product-form"
onsubmit="event.preventDefault(); createProduct();"
>

<div class="form-row">

<input
id="name"
placeholder="Nombre producto"
required
>

<input
id="description"
placeholder="Descripción"
>

<input
id="price"
type="number"
placeholder="Precio"
required
>

<input
type="file"
id="image"
>

<input
id="category"
placeholder="Categoría"
>

<label>
<input
type="checkbox"
id="featured"
>
Destacado
</label>

<button
id="save-btn"
type="submit"
>
Agregar
</button>

</div>

</form>


<!-- VARIANTES ERP -->

<div style="margin-top:25px;">

<h3 style="margin-bottom:15px;">
Variantes ERP (1 imagen por color)
</h3>

<div class="form-row">

<input
id="variant-color"
placeholder="Color (ej: rojo)"
>

<input
id="variant-size"
placeholder="Tallas (ej: S,M,L)"
>

<input
id="variant-price"
type="number"
placeholder="Precio variante"
>

<input
id="variant-stock"
type="number"
placeholder="Stock inicial"
>

<input
id="variant-sku"
placeholder="SKU"
>

<input
id="variant-cost"
type="number"
placeholder="Costo"
>

<input
type="file"
id="variant-image"
>

<button
type="button"
onclick="addVariant()"
>
Agregar variante
</button>

</div>

<div id="variants-list"></div>

</div>

</div>


<!-- FILTERS ERP -->

<div class="filters-card">

<div class="filters-grid">

<input
type="text"
id="search-product"
placeholder="Buscar producto..."
onkeyup="searchProducts()"
>

<select
id="filter-category"
onchange="filterByCategory()"
>

<option value="">
Todas las categorías
</option>

</select>

<select
id="limit-products"
onchange="changeLimit()"
>

<option value="10">
10 productos
</option>

<option value="20">
20 productos
</option>

<option value="50">
50 productos
</option>

</select>

</div>

<div class="info-row">

<div id="pagination-info">
Mostrando productos
</div>

<div id="page-info">
Página 1
</div>

</div>

</div>


<!-- TABLE -->

<div class="table-card">

<table>

<thead>

<tr>

<th>
Nombre
</th>

<th>
Precio
</th>

<th>
Stock
</th>

<th>
Estado
</th>

<th>
Imagen
</th>

<th>
Destacado
</th>

<th>
Acciones
</th>

</tr>

</thead>

<tbody id="products-table"></tbody>

</table>

</div>


<!-- PAGINATION -->

<div class="pagination">

<button
id="prev-page"
onclick="prevPage()"
>
Anterior
</button>

<div id="page-info">
Página 1 de 1
</div>

<button
id="next-page"
onclick="nextPage()"
>
Siguiente
</button>

</div>

</div>


<script src="js/auth.js"></script>

<script type="module" src="js/products.js"></script>

</body>
</html>
