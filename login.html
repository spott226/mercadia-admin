<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercadia Admin</title>

<link rel="stylesheet" href="css/styles.css">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
background:#0f172a;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-container{
display:flex;
flex-direction:column;
align-items:center;
}

.logo{
color:white;
font-size:28px;
font-weight:600;
margin-bottom:25px;
letter-spacing:1px;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:340px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.login-box h2{
margin-bottom:20px;
font-size:18px;
color:#111827;
}

.input-group{
margin-bottom:14px;
}

.input-group input{
width:100%;
padding:12px;
border:1px solid #d1d5db;
border-radius:6px;
font-size:14px;
}

.input-group input:focus{
outline:none;
border-color:#2563eb;
}

button{
width:100%;
padding:12px;
border:none;
background:#2563eb;
color:white;
font-weight:600;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1e40af;
}

.error{
color:#ef4444;
margin-top:10px;
font-size:13px;
}

.footer{
margin-top:20px;
font-size:12px;
color:#94a3b8;
text-align:center;
}

</style>

</head>

<body>

<div class="login-container">

<div class="logo">
Mercadia
</div>

<div class="login-box">

<h2>Panel de administración</h2>

<div class="input-group">
<input id="email" placeholder="Correo">
</div>

<div class="input-group">
<input id="password" type="password" placeholder="Contraseña">
</div>

<button onclick="login()">Entrar</button>

<div id="error" class="error"></div>

</div>

<div class="footer">
Mercadia Admin
</div>

</div>

<script>

/* =========================
EVITAR VOLVER AL LOGIN
========================= */

const token = localStorage.getItem("token");

if(token){
window.location.href="dashboard.html";
}


/* =========================
LOGIN
========================= */

async function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

const res = await fetch("https://mercadia-back-production.up.railway.app/api/admin/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
});

const data = await res.json();

if(data.token){

localStorage.setItem("token",data.token);
localStorage.setItem("store_id",data.store_id);

window.location.href="dashboard.html";

}else{

document.getElementById("error").innerText="Credenciales incorrectas";

}

}catch(err){

console.error(err);
document.getElementById("error").innerText="Error conectando con el servidor";

}

}

</script>

</body>
</html>
