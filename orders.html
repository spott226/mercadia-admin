<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercadia ERP - Pedidos</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
display:flex;
background:#f1f5f9;
min-height:100vh;
overflow-x:hidden;
}


/* SIDEBAR */

.sidebar{
width:230px;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
padding:20px;
flex-shrink:0;
}

.logo{
font-size:22px;
font-weight:700;
margin-bottom:30px;
}

.menu a{
display:block;
padding:12px;
color:#cbd5e1;
text-decoration:none;
border-radius:8px;
margin-bottom:8px;
transition:.2s;
}

.menu a:hover{
background:#1e293b;
color:white;
}

.logout{
margin-top:auto;
background:#ef4444;
border:none;
padding:12px;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:600;
}


/* CONTENT */

.content{
flex:1;
padding:30px;
min-width:0;
}

.page-title{
font-size:30px;
font-weight:700;
margin-bottom:25px;
color:#0f172a;
}


/* KPIS */

.kpis{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:25px;
}

.kpi-card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,.06);
}

.kpi-title{
font-size:14px;
color:#64748b;
margin-bottom:10px;
}

.kpi-value{
font-size:28px;
font-weight:700;
color:#0f172a;
}


/* FILTERS */

.filters{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,.06);
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.filters input,
.filters select{
padding:12px;
border:1px solid #cbd5e1;
border-radius:8px;
min-width:200px;
background:white;
}


/* TABLE */

.table-card{
background:white;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,.06);
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1200px;
}

th{
background:#f8fafc;
font-weight:700;
color:#334155;
}

th,td{
padding:16px;
border-bottom:1px solid #e2e8f0;
text-align:left;
vertical-align:top;
}

.order-products{
display:flex;
flex-direction:column;
gap:6px;
}

.product-item{
background:#f8fafc;
padding:8px;
border-radius:6px;
font-size:13px;
}


/* STATUS */

.status{
padding:8px 12px;
border-radius:999px;
font-size:12px;
font-weight:700;
display:inline-block;
}

.status-pending{
background:#fef3c7;
color:#92400e;
}

.status-paid{
background:#dcfce7;
color:#166534;
}

.status-cancelled{
background:#fee2e2;
color:#991b1b;
}


/* ACTIONS */

.actions{
display:flex;
flex-direction:column;
gap:8px;
}

.actions select{
padding:10px;
border-radius:8px;
border:1px solid #cbd5e1;
}

.actions button{
padding:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
font-weight:600;
}

.actions button:hover{
background:#1d4ed8;
}


/* EMPTY */

.empty{
padding:40px;
text-align:center;
color:#64748b;
}


/* RESPONSIVE */

@media(max-width:900px){

.sidebar{
width:180px;
padding:15px;
}

.content{
padding:20px;
}

}

@media(max-width:700px){

body{
display:block;
}

.sidebar{
width:100%;
height:auto;
}

.content{
padding:15px;
}

.filters{
flex-direction:column;
}

.filters input,
.filters select{
width:100%;
}

.page-title{
font-size:24px;
}

}

</style>

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Mercadia
</div>

<div class="menu">

<a href="dashboard.html">
Dashboard
</a>

<a href="products.html">
Productos
</a>

<a href="orders.html">
Pedidos
</a>

<a href="inventory.html">
Inventario
</a>

<a href="customers.html">
Clientes
</a>

</div>

<button class="logout" onclick="logout()">
Cerrar sesión
</button>

</div>


<!-- CONTENT -->

<div class="content">

<h1 class="page-title">
Gestión de pedidos ERP
</h1>


<!-- KPIS -->

<div class="kpis">

<div class="kpi-card">

<div class="kpi-title">
Pedidos totales
</div>

<div
class="kpi-value"
id="total-orders"
>
0
</div>

</div>


<div class="kpi-card">

<div class="kpi-title">
Pendientes
</div>

<div
class="kpi-value"
id="pending-orders"
>
0
</div>

</div>


<div class="kpi-card">

<div class="kpi-title">
Pagados
</div>

<div
class="kpi-value"
id="paid-orders"
>
0
</div>

</div>


<div class="kpi-card">

<div class="kpi-title">
Ventas totales
</div>

<div
class="kpi-value"
id="total-sales"
>
$0
</div>

</div>

</div>


<!-- FILTERS -->

<div class="filters">

<input
type="text"
id="search-order"
placeholder="Buscar cliente o teléfono..."
>

<select id="filter-status">

<option value="">
Todos los estados
</option>

<option value="PENDING">
Pendiente
</option>

<option value="PAID">
Pagado
</option>

<option value="CANCELLED">
Cancelado
</option>

</select>

</div>


<!-- TABLE -->

<div class="table-card">

<table>

<thead>

<tr>

<th>
Pedido
</th>

<th>
Cliente
</th>

<th>
Teléfono
</th>

<th>
Dirección
</th>

<th>
Productos
</th>

<th>
Total
</th>

<th>
Estado
</th>

<th>
Fecha
</th>

<th>
Acciones
</th>

</tr>

</thead>

<tbody id="orders-table">

<tr>

<td colspan="9" class="empty">
Cargando pedidos...
</td>

</tr>

</tbody>

</table>

</div>

</div>


<script src="js/auth.js"></script>

<script type="module" src="js/orders.js"></script>

</body>
</html>
