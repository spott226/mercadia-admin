<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercadia ERP - Pedidos</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
display:flex;
background:#f1f5f9;
min-height:100vh;
overflow-x:hidden;
}


/* BOTON HAMBURGUESA */

.menu-toggle{
display:none;
position:fixed;
top:15px;
left:15px;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
border:none;
width:48px;
height:48px;
border-radius:14px;
font-size:22px;
cursor:pointer;
z-index:2000;
box-shadow:0 8px 25px rgba(15,23,42,.25);
backdrop-filter:blur(10px);
transition:.25s ease;
}

.menu-toggle:hover{
transform:scale(1.05);
background:linear-gradient(135deg,#1e293b,#334155);
}

.menu-toggle:active{
transform:scale(.96);
}


/* OVERLAY */

.sidebar-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(3px);
opacity:0;
pointer-events:none;
transition:.3s;
z-index:1400;
}

.sidebar-overlay.active{
opacity:1;
pointer-events:auto;
}


/* SIDEBAR */

.sidebar{
width:230px;
background:linear-gradient(180deg,#0f172a 0%,#111827 100%);
color:white;
display:flex;
flex-direction:column;
padding:20px;
flex-shrink:0;
transition:.3s ease;
box-shadow:8px 0 30px rgba(0,0,0,.08);
}

.logo{
font-size:22px;
font-weight:700;
margin-bottom:35px;
letter-spacing:.5px;
}

.menu a{
display:flex;
align-items:center;
gap:10px;
padding:13px 14px;
color:#cbd5e1;
text-decoration:none;
border-radius:12px;
margin-bottom:8px;
transition:.25s ease;
font-size:15px;
font-weight:500;
}

.menu a:hover{
background:rgba(255,255,255,.08);
color:white;
transform:translateX(3px);
}

.logout{
margin-top:auto;
background:linear-gradient(135deg,#ef4444,#dc2626);
border:none;
padding:12px;
border-radius:12px;
color:white;
cursor:pointer;
font-weight:600;
transition:.25s ease;
}

.logout:hover{
transform:translateY(-1px);
box-shadow:0 10px 20px rgba(239,68,68,.25);
}


/* CONTENT */

.content{
flex:1;
padding:30px;
min-width:0;
}

.page-title{
font-size:30px;
font-weight:700;
margin-bottom:25px;
color:#0f172a;
}


/* KPIS */

.kpis{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:25px;
}

.kpi-card{
background:white;
padding:22px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.06);
border:1px solid rgba(226,232,240,.7);
transition:.25s ease;
}

.kpi-card:hover{
transform:translateY(-3px);
box-shadow:0 14px 35px rgba(0,0,0,.08);
}

.kpi-title{
font-size:14px;
color:#64748b;
margin-bottom:10px;
}

.kpi-value{
font-size:28px;
font-weight:700;
color:#0f172a;
}


/* FILTERS */

.filters{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.06);
margin-bottom:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
border:1px solid rgba(226,232,240,.7);
}

.filters input,
.filters select{
padding:12px;
border:1px solid #cbd5e1;
border-radius:12px;
min-width:200px;
background:white;
outline:none;
transition:.2s;
}

.filters input:focus,
.filters select:focus{
border-color:#0f172a;
box-shadow:0 0 0 4px rgba(15,23,42,.08);
}


/* TABLE */

.table-card{
background:white;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.06);
overflow-x:auto;
border:1px solid rgba(226,232,240,.7);
}

table{
width:100%;
border-collapse:collapse;
min-width:1200px;
}

th{
background:#f8fafc;
font-weight:700;
color:#334155;
}

th,td{
padding:16px;
border-bottom:1px solid #e2e8f0;
text-align:left;
vertical-align:top;
}

tbody tr{
transition:.2s;
}

tbody tr:hover{
background:#f8fafc;
}

.order-products{
display:flex;
flex-direction:column;
gap:6px;
}

.product-item{
background:#f8fafc;
padding:10px;
border-radius:10px;
font-size:13px;
border:1px solid #e2e8f0;
}


/* STATUS */

.status{
padding:8px 12px;
border-radius:999px;
font-size:12px;
font-weight:700;
display:inline-block;
}

.status-pending{
background:#fef3c7;
color:#92400e;
}

.status-paid{
background:#dcfce7;
color:#166534;
}

.status-cancelled{
background:#fee2e2;
color:#991b1b;
}


/* ACTIONS */

.actions{
display:flex;
flex-direction:column;
gap:8px;
}

.actions select{
padding:10px;
border-radius:10px;
border:1px solid #cbd5e1;
outline:none;
}

.actions button{
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
cursor:pointer;
font-weight:600;
transition:.2s;
}

.actions button:hover{
transform:translateY(-1px);
box-shadow:0 10px 20px rgba(37,99,235,.25);
}


/* EMPTY */

.empty{
padding:40px;
text-align:center;
color:#64748b;
}


/* RESPONSIVE */

@media(max-width:900px){

.sidebar{
width:190px;
padding:16px;
}

.content{
padding:20px;
}

}

@media(max-width:700px){

body{
display:block;
}

.menu-toggle{
display:flex;
align-items:center;
justify-content:center;
}

.sidebar{
position:fixed;
left:-260px;
top:0;
width:240px;
height:100vh;
z-index:1500;
padding-top:70px;
border-top-right-radius:24px;
border-bottom-right-radius:24px;
}

.sidebar.open{
left:0;
}

.content{
padding:75px 15px 15px 15px;
}

.filters{
flex-direction:column;
}

.filters input,
.filters select{
width:100%;
}

.page-title{
font-size:24px;
}

}

</style>

</head>

<body>

<button class="menu-toggle" onclick="toggleMenu()">
☰
</button>

<div class="sidebar-overlay" onclick="toggleMenu()"></div>


<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Mercadia
</div>

<div class="menu">

<a href="dashboard.html">
Dashboard
</a>

<a href="products.html">
Productos
</a>

<a href="orders.html">
Pedidos
</a>

<a href="inventory.html">
Inventario
</a>

<a href="customers.html">
Clientes
</a>

</div>

<button class="logout" onclick="logout()">
Cerrar sesión
</button>

</div>


<!-- CONTENT -->

<div class="content">

<h1 class="page-title">
Gestión de pedidos ERP
</h1>


<!-- KPIS -->

<div class="kpis">

<div class="kpi-card">

<div class="kpi-title">
Pedidos totales
</div>

<div
class="kpi-value"
id="total-orders"
>
0
</div>

</div>


<div class="kpi-card">

<div class="kpi-title">
Pendientes
</div>

<div
class="kpi-value"
id="pending-orders"
>
0
</div>

</div>


<div class="kpi-card">

<div class="kpi-title">
Pagados
</div>

<div
class="kpi-value"
id="paid-orders"
>
0
</div>

</div>


<div class="kpi-card">

<div class="kpi-title">
Ventas totales
</div>

<div
class="kpi-value"
id="total-sales"
>
$0
</div>

</div>

</div>


<!-- FILTERS -->

<div class="filters">

<input
type="text"
id="search-order"
placeholder="Buscar cliente o teléfono..."
>

<select id="filter-status">

<option value="">
Todos los estados
</option>

<option value="PENDING">
Pendiente
</option>

<option value="PAID">
Pagado
</option>

<option value="CANCELLED">
Cancelado
</option>

</select>

</div>


<!-- TABLE -->

<div class="table-card">

<table>

<thead>

<tr>

<th>
Pedido
</th>

<th>
Cliente
</th>

<th>
Teléfono
</th>

<th>
Dirección
</th>

<th>
Productos
</th>

<th>
Total
</th>

<th>
Estado
</th>

<th>
Fecha
</th>

<th>
Acciones
</th>

</tr>

</thead>

<tbody id="orders-table">

<tr>

<td colspan="9" class="empty">
Cargando pedidos...
</td>

</tr>

</tbody>

</table>

</div>

</div>


<script>

function toggleMenu(){

const sidebar = document.querySelector(".sidebar");
const overlay = document.querySelector(".sidebar-overlay");

sidebar.classList.toggle("open");
overlay.classList.toggle("active");

}

</script>

<script src="js/auth.js"></script>

<script type="module" src="js/orders.js"></script>

</body>
</html>
