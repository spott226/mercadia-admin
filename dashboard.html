<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercadia Admin</title>

<link rel="stylesheet" href="css/styles.css">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
display:flex;
background:#f1f5f9;
min-height:100vh;
overflow-x:hidden;
}


/* BOTON HAMBURGUESA */

.menu-toggle{
display:none;
position:fixed;
top:15px;
left:15px;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
border:none;
width:48px;
height:48px;
border-radius:14px;
font-size:22px;
cursor:pointer;
z-index:2000;
box-shadow:0 8px 25px rgba(15,23,42,.25);
backdrop-filter:blur(10px);
transition:.25s ease;
}

.menu-toggle:hover{
transform:scale(1.05);
background:linear-gradient(135deg,#1e293b,#334155);
}

.menu-toggle:active{
transform:scale(.96);
}


/* OVERLAY */

.sidebar-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(3px);
opacity:0;
pointer-events:none;
transition:.3s;
z-index:1400;
}

.sidebar-overlay.active{
opacity:1;
pointer-events:auto;
}


/* SIDEBAR */

.sidebar{
width:230px;
background:linear-gradient(180deg,#0f172a 0%,#111827 100%);
color:white;
display:flex;
flex-direction:column;
padding:20px;
flex-shrink:0;
transition:.3s ease;
box-shadow:8px 0 30px rgba(0,0,0,.08);
}

.logo{
font-size:22px;
font-weight:700;
margin-bottom:35px;
letter-spacing:.5px;
}

.menu a{
display:flex;
align-items:center;
gap:10px;
padding:13px 14px;
color:#cbd5f5;
text-decoration:none;
border-radius:12px;
margin-bottom:8px;
transition:.25s ease;
font-size:15px;
font-weight:500;
}

.menu a:hover{
background:rgba(255,255,255,.08);
color:white;
transform:translateX(3px);
}

.logout{
margin-top:auto;
background:linear-gradient(135deg,#ef4444,#dc2626);
border:none;
color:white;
padding:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:.25s ease;
}

.logout:hover{
transform:translateY(-1px);
box-shadow:0 10px 20px rgba(239,68,68,.25);
}


/* CONTENT */

.content{
flex:1;
padding:30px;
min-width:0;
}

.header{
font-size:24px;
margin-bottom:25px;
font-weight:700;
color:#0f172a;
}


/* KPI GRID */

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.stat-card{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.06);
border:1px solid rgba(226,232,240,.7);
transition:.25s ease;
}

.stat-card:hover{
transform:translateY(-3px);
box-shadow:0 14px 35px rgba(0,0,0,.08);
}

.stat-card h3{
font-size:32px;
margin-bottom:10px;
color:#0f172a;
font-weight:700;
}

.stat-card p{
color:#64748b;
font-size:15px;
}


/* TABLET */

@media (max-width:900px){

.sidebar{
width:190px;
padding:16px;
}

.content{
padding:20px;
}

}


/* MOBILE */

@media (max-width:700px){

body{
display:block;
}

/* hamburguesa visible */

.menu-toggle{
display:flex;
align-items:center;
justify-content:center;
}

/* sidebar oculto */

.sidebar{
position:fixed;
left:-260px;
top:0;
width:240px;
height:100vh;
z-index:1500;
padding-top:70px;
border-top-right-radius:24px;
border-bottom-right-radius:24px;
}

.sidebar.open{
left:0;
}

.logo{
font-size:20px;
padding-left:4px;
}

.menu a{
font-size:14px;
}

.logout{
font-size:13px;
}

/* contenido */

.content{
padding:75px 18px 20px 18px;
}

.header{
font-size:22px;
}

.stats-grid{
gap:14px;
}

}


/* CELULARES PEQUEÑOS */

@media (max-width:420px){

.header{
font-size:20px;
}

.stat-card{
padding:18px;
border-radius:16px;
}

.stat-card h3{
font-size:26px;
}

}

</style>

</head>

<body>

<button class="menu-toggle" onclick="toggleMenu()">
☰
</button>

<div class="sidebar-overlay" onclick="toggleMenu()"></div>


<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Mercadia
</div>

<div class="menu">

<a href="dashboard.html">
Dashboard
</a>

<a href="products.html">
Productos
</a>

<a href="orders.html">
Pedidos
</a>

<a href="inventory.html">
Inventario
</a>

<a href="customers.html">
Clientes
</a>

</div>

<button class="logout" onclick="logout()">
Cerrar sesión
</button>

</div>


<!-- CONTENT -->

<div class="content">

<div class="header">
Panel de administración
</div>


<!-- KPI CARDS -->

<div class="stats-grid">

  <div class="stat-card">

    <h3 id="total-orders">
      0
    </h3>

    <p>
      Pedidos pendientes
    </p>

  </div>


  <div class="stat-card">

    <h3 id="month-sales">
      $0
    </h3>

    <p>
      Ventas del mes
    </p>

  </div>


  <div class="stat-card">

    <h3 id="total-products">
      0
    </h3>

    <p>
      Productos
    </p>

  </div>


  <div class="stat-card">

    <h3 id="low-stock">
      0
    </h3>

    <p>
      Stock bajo
    </p>

  </div>

</div>

</div>


<script src="js/auth.js"></script>

<script>

/* =========================
PROTEGER DASHBOARD
========================= */

protect();


/* =========================
MENU HAMBURGUESA
========================= */

function toggleMenu(){

const sidebar = document.querySelector(".sidebar");
const overlay = document.querySelector(".sidebar-overlay");

sidebar.classList.toggle("open");
overlay.classList.toggle("active");

}

</script>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
