<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercadia Admin</title>

<link rel="stylesheet" href="css/styles.css">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
display:flex;
background:#f1f5f9;
min-height:100vh;
overflow-x:hidden;
}


/* BOTON HAMBURGUESA */

.menu-toggle{
display:none;
position:fixed;
top:15px;
left:15px;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
border:none;
width:48px;
height:48px;
border-radius:14px;
font-size:22px;
cursor:pointer;
z-index:2000;
box-shadow:0 8px 25px rgba(15,23,42,.25);
backdrop-filter:blur(10px);
transition:.25s ease;
}

.menu-toggle:hover{
transform:scale(1.05);
background:linear-gradient(135deg,#1e293b,#334155);
}

.menu-toggle:active{
transform:scale(.96);
}


/* OVERLAY */

.sidebar-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(3px);
opacity:0;
pointer-events:none;
transition:.3s;
z-index:1400;
}

.sidebar-overlay.active{
opacity:1;
pointer-events:auto;
}


/* SIDEBAR */

.sidebar{
width:230px;
background:linear-gradient(180deg,#0f172a 0%,#111827 100%);
color:white;
display:flex;
flex-direction:column;
padding:20px;
flex-shrink:0;
transition:.3s ease;
box-shadow:8px 0 30px rgba(0,0,0,.08);
}

.logo{
font-size:22px;
font-weight:700;
margin-bottom:35px;
letter-spacing:.5px;
}

.menu a{
display:flex;
align-items:center;
gap:10px;
padding:13px 14px;
color:#cbd5f5;
text-decoration:none;
border-radius:12px;
margin-bottom:8px;
transition:.25s ease;
font-size:15px;
font-weight:500;
}

.menu a:hover{
background:rgba(255,255,255,.08);
color:white;
transform:translateX(3px);
}

.logout{
margin-top:auto;
background:linear-gradient(135deg,#ef4444,#dc2626);
border:none;
color:white;
padding:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:.25s ease;
}

.logout:hover{
transform:translateY(-1px);
box-shadow:0 10px 20px rgba(239,68,68,.25);
}


/* CONTENT */

.content{
flex:1;
padding:30px;
min-width:0;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
}

.header h1{
font-size:30px;
font-weight:700;
color:#0f172a;
}

.export-btn{
padding:12px 18px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
font-weight:600;
cursor:pointer;
transition:.25s ease;
}

.export-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(37,99,235,.25);
}


/* KPI GRID */

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.06);
border:1px solid rgba(226,232,240,.7);
transition:.25s ease;
}

.stat-card:hover{
transform:translateY(-3px);
box-shadow:0 14px 35px rgba(0,0,0,.08);
}

.stat-card h3{
font-size:32px;
margin-bottom:10px;
color:#0f172a;
font-weight:700;
}

.stat-card p{
color:#64748b;
font-size:15px;
}


/* TABLES */

.section-card{
background:white;
padding:22px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.06);
border:1px solid rgba(226,232,240,.7);
margin-bottom:25px;
overflow-x:auto;
}

.section-title{
font-size:20px;
font-weight:700;
margin-bottom:18px;
color:#0f172a;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#f8fafc;
font-weight:700;
color:#334155;
}

th,td{
padding:14px;
border-bottom:1px solid #e5e7eb;
text-align:left;
}

tbody tr:hover{
background:#f8fafc;
}


/* BEST SELLERS */

.best-sellers-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.best-product{
background:#f8fafc;
padding:18px;
border-radius:14px;
border:1px solid #e2e8f0;
transition:.25s ease;
}

.best-product:hover{
transform:translateY(-2px);
background:white;
box-shadow:0 10px 25px rgba(0,0,0,.06);
}


/* MOBILE */

@media(max-width:700px){

body{
display:block;
}

.menu-toggle{
display:flex;
align-items:center;
justify-content:center;
}

.sidebar{
position:fixed;
left:-260px;
top:0;
width:240px;
height:100vh;
z-index:1500;
padding-top:70px;
border-top-right-radius:24px;
border-bottom-right-radius:24px;
}

.sidebar.open{
left:0;
}

.content{
padding:75px 15px 20px 15px;
}

.header{
flex-direction:column;
align-items:flex-start;
}

.header h1{
font-size:24px;
}

.stats-grid{
gap:14px;
}

.stat-card{
padding:18px;
}

.stat-card h3{
font-size:26px;
}

}

</style>

</head>

<body>

<button class="menu-toggle" onclick="toggleMenu()">
☰
</button>

<div class="sidebar-overlay" onclick="toggleMenu()"></div>


<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Mercadia

<!-- CONTENT -->

<div class="content">

<!-- KPI CARDS -->

<div class="stats-grid">

0
</h3>

</div>


<div class="stat-card">

<h3 id="month-sales">
$0
</h3>

<p>
Ventas del mes
</p>

</div>


<div class="stat-card">

<h3 id="total-products">
0
</h3>

<p>
Productos
</p>

</div>


<div class="stat-card">

<h3 id="low-stock">
0
</h3>

<p>
Stock bajo
</p>

</div>


<div class="stat-card">

<h3 id="total-revenue">
$0
</h3>

<p>
Ingresos totales
</p>

</div>


<div class="stat-card">

<h3 id="average-ticket">
$0
</h3>

<p>
Ticket promedio
</p>

</div>

</div>


<!-- RECENT ORDERS -->

<div class="section-card">

<div class="section-title">
Últimos pedidos
</div>

<table>

<thead>

<tr>

<th>
Pedido
</th>

<th>
Cliente
</th>

<th>
Total
</th>

<th>
Estado
</th>

<th>
Fecha
</th>

</tr>

</thead>

<tbody id="recent-orders">

<tr>

<td colspan="5">
No hay pedidos
</td>

</tr>

</tbody>

</table>

</div>


<!-- BEST SELLERS -->

<div class="section-card">

<div class="section-title">
Productos destacados
</div>

<div
class="best-sellers-grid"
id="best-sellers"
>

<div class="best-product">

Cargando...

</div>

</div>

</div>

</div>


<script src="js/auth.js"></script>

<script>

/* =========================
PROTEGER DASHBOARD
========================= */

protect();


/* =========================
MENU
========================= */

function toggleMenu(){

const sidebar =
document.querySelector(".sidebar");

const overlay =
document.querySelector(".sidebar-overlay");

sidebar.classList.toggle("open");

overlay.classList.toggle("active");

}

</script>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
