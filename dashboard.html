<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercadia Admin</title>

<link rel="stylesheet" href="css/styles.css">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
display:flex;
background:#f1f5f9;
min-height:100vh;
overflow-x:hidden;
}

/* BOTON HAMBURGUESA */

.menu-toggle{
display:none;
position:fixed;
top:15px;
left:15px;
background:#0f172a;
color:white;
border:none;
padding:10px 12px;
border-radius:6px;
font-size:20px;
cursor:pointer;
z-index:2000;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
padding:20px;
flex-shrink:0;
transition:0.3s;
}

.logo{
font-size:22px;
font-weight:600;
margin-bottom:30px;
}

.menu a{
display:block;
padding:12px;
color:#cbd5f5;
text-decoration:none;
border-radius:6px;
margin-bottom:6px;
}

.menu a:hover{
background:#1e293b;
color:white;
}

.logout{
margin-top:auto;
background:#ef4444;
border:none;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
}

/* CONTENT */

.content{
flex:1;
padding:30px;
min-width:0;
}

.header{
font-size:24px;
margin-bottom:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
max-width:500px;
width:100%;
}

/* TABLET */

@media (max-width:900px){

.sidebar{
width:180px;
padding:15px;
}

.content{
padding:20px;
}

}

/* MOBILE */

@media (max-width:700px){

body{
display:block;
}

/* hamburguesa visible */

.menu-toggle{
display:block;
}

/* sidebar oculto */

.sidebar{
position:fixed;
left:-240px;
top:0;
width:220px;
height:100vh;
z-index:1500;
}

.sidebar.open{
left:0;
}

.logo{
font-size:18px;
}

.menu a{
font-size:14px;
}

.logout{
font-size:13px;
}

/* contenido */

.content{
padding:60px 20px 20px 20px;
}

.header{
font-size:22px;
}

.card{
padding:20px;
}

}

/* CELULARES PEQUEÑOS */

@media (max-width:420px){

.header{
font-size:20px;
}

.card{
padding:18px;
}

}

</style>

</head>

<body>

<button class="menu-toggle" onclick="toggleMenu()">☰</button>

<div class="sidebar">

<div class="logo">
Mercadia
</div>

<div class="menu">

<a href="dashboard.html">Dashboard</a>

<a href="products.html">Productos</a>

</div>

<button class="logout" onclick="logout()">
Cerrar sesión
</button>

</div>

<div class="content">

<div class="header">
Panel de administración
</div>

<div class="card">

Bienvenido al panel de Mercadia.

Desde aquí puedes administrar los productos de tu tienda.

</div>

</div>

<script src="js/auth.js"></script>

<script>

/* =========================
PROTEGER DASHBOARD
========================= */

protect();

/* =========================
MENU HAMBURGUESA
========================= */

function toggleMenu(){

const sidebar = document.querySelector(".sidebar");

sidebar.classList.toggle("open");

}

</script>

<script src="js/dashboard.js"></script>

</body>
</html>
