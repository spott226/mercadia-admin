<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercadia Admin</title>

<link rel="stylesheet" href="css/styles.css">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
display:flex;
background:#f1f5f9;
min-height:100vh;
overflow-x:hidden;
}


/* BOTON HAMBURGUESA */

.menu-toggle{
display:none;
position:fixed;
top:15px;
left:15px;
background:#0f172a;
color:white;
border:none;
padding:10px 12px;
border-radius:6px;
font-size:20px;
cursor:pointer;
z-index:2000;
}


/* SIDEBAR */

.sidebar{
width:230px;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
padding:20px;
flex-shrink:0;
transition:0.3s;
}

.logo{
font-size:22px;
font-weight:600;
margin-bottom:30px;
}

.menu a{
display:block;
padding:12px;
color:#cbd5f5;
text-decoration:none;
border-radius:6px;
margin-bottom:6px;
transition:0.2s;
}

.menu a:hover{
background:#1e293b;
color:white;
}

.logout{
margin-top:auto;
background:#ef4444;
border:none;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
}


/* CONTENT */

.content{
flex:1;
padding:30px;
min-width:0;
}

.header{
font-size:24px;
margin-bottom:25px;
font-weight:600;
}


/* KPI GRID */

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.stat-card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.stat-card h3{
font-size:32px;
margin-bottom:10px;
color:#0f172a;
}

.stat-card p{
color:#64748b;
font-size:15px;
}


/* TABLET */

@media (max-width:900px){

.sidebar{
width:180px;
padding:15px;
}

.content{
padding:20px;
}

}


/* MOBILE */

@media (max-width:700px){

body{
display:block;
}

/* hamburguesa visible */

.menu-toggle{
display:block;
}

/* sidebar oculto */

.sidebar{
position:fixed;
left:-240px;
top:0;
width:220px;
height:100vh;
z-index:1500;
}

.sidebar.open{
left:0;
}

.logo{
font-size:18px;
}

.menu a{
font-size:14px;
}

.logout{
font-size:13px;
}

/* contenido */

.content{
padding:60px 20px 20px 20px;
}

.header{
font-size:22px;
}

}


/* CELULARES PEQUEÑOS */

@media (max-width:420px){

.header{
font-size:20px;
}

.stat-card{
padding:18px;
}

.stat-card h3{
font-size:26px;
}

}

</style>

</head>

<body>

<button class="menu-toggle" onclick="toggleMenu()">
☰
</button>


<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Mercadia
</div>

<div class="menu">

<a href="dashboard.html">
Dashboard
</a>

<a href="products.html">
Productos
</a>

<a href="orders.html">
Pedidos
</a>

<a href="inventory.html">
Inventario
</a>

<a href="customers.html">
Clientes
</a>

</div>

<button class="logout" onclick="logout()">
Cerrar sesión
</button>

</div>


<!-- CONTENT -->

<div class="content">

<div class="header">
Panel de administración
</div>


<!-- KPI CARDS -->

<div class="stats-grid">

  <div class="stat-card">

    <h3 id="total-orders">
      0
    </h3>

    <p>
      Pedidos pendientes
    </p>

  </div>


  <div class="stat-card">

    <h3 id="month-sales">
      $0
    </h3>

    <p>
      Ventas del mes
    </p>

  </div>


  <div class="stat-card">

    <h3 id="total-products">
      0
    </h3>

    <p>
      Productos
    </p>

  </div>


  <div class="stat-card">

    <h3 id="low-stock">
      0
    </h3>

    <p>
      Stock bajo
    </p>

  </div>

</div>

</div>


<script src="js/auth.js"></script>

<script>

/* =========================
PROTEGER DASHBOARD
========================= */

protect();


/* =========================
MENU HAMBURGUESA
========================= */

function toggleMenu(){

const sidebar = document.querySelector(".sidebar");

sidebar.classList.toggle("open");

}

</script>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
